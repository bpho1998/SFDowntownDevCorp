name: CA AG Filing Monitor

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual runs from GitHub UI

jobs:
  check-filings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore filing state from cache
        uses: actions/cache@v4
        with:
          path: filing_state.json
          key: filing-state-${{ github.run_id }}
          restore-keys: |
            filing-state-

      - name: Run filing check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/check_filings.py

      - name: Save filing state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: filing_state.json
          key: filing-state-${{ github.run_id }}
